services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

volumes:
  qdrant_data:
